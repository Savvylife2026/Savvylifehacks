<!DOCTYPE html>
<html>
<head>
    <title>Savvylife</title>
</head>

<body style="font-family: Arial; text-align:center; background:#0f172a; color:white;">

    <!-- HOME SCREEN -->
    <div id="home">
        <h1>Welcome 🚀</h1>
        <p>This is Savvylifehacks</p>

        <button onclick="goToAbout()" 
        style="padding:15px; margin:10px; background:#22c55e; color:white; border:none; border-radius:10px;">
            Go to About Page
        </button>

        <button onclick="goToContact()" 
        style="padding:15px; margin:10px; background:#f59e0b; color:white; border:none; border-radius:10px;">
            Contact Me
        </button>
    </div>

    <!-- ABOUT SCREEN -->
    <div id="about" style="display:none;">
        <h1>About Savvylife 😎</h1>
        <p>This app was built by Timothy!</p>

        <button onclick="goHome()" 
        style="padding:15px; margin:10px; background:#3b82f6; color:white; border:none; border-radius:10px;">
            Back Home
        </button>
    </div>

    <!-- CONTACT SCREEN WITH FORM -->
    <div id="contact" style="display:none;">
        <h1>Contact Me 📞</h1>
        <p>Send me a message:</p>

        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" 
                   style="padding:10px; margin:5px; width:80%; border-radius:5px;"><br>
            <input type="email" id="email" placeholder="Your Email" 
                   style="padding:10px; margin:5px; width:80%; border-radius:5px;"><br>
            <textarea id="message" placeholder="Your Message" 
                      style="padding:10px; margin:5px; width:80%; height:100px; border-radius:5px;"></textarea><br>
            <button type="submit" 
                    style="padding:15px; background:#f59e0b; color:white; border:none; border-radius:10px; margin-top:5px;">
                Send Message
            </button>
        </form>

        <p id="confirmation" style="color:#22c55e;"></p>

        <button onclick="goHome()" 
        style="padding:15px; margin:10px; background:#3b82f6; color:white; border:none; border-radius:10px;">
            Back Home
        </button>
    </div>

    <script>
        function goToAbout() {
            document.getElementById("home").style.display = "none";
            document.getElementById("about").style.display = "block";
            document.getElementById("contact").style.display = "none";
        }

        function goToContact() {
            document.getElementById("home").style.display = "none";
            document.getElementById("about").style.display = "none";
            document.getElementById("contact").style.display = "block";
        }

        function goHome() {
            document.getElementById("home").style.display = "block";
            document.getElementById("about").style.display = "none";
            document.getElementById("contact").style.display = "none";
        }

        // Contact form submission
        document.getElementById("contactForm").addEventListener("submit", function(e){
            e.preventDefault(); // Prevent page reload
            document.getElementById("confirmation").innerText = "Thanks! Your message has been received 🚀";
            document.getElementById("contactForm").reset(); // Clears the form
        });
    </script>

</body>
</html>

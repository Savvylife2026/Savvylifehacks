<!DOCTYPE html>
<html>
<head>
    <title>Church App</title>
</head>

<body style="font-family: Arial; text-align:center; background:#0f172a; color:white;">

    <!-- SETUP SCREEN -->
    <div id="setup">
        <h1>Setup Your Church</h1>

        <input type="text" id="churchName" placeholder="Enter Church Name"
        style="padding:10px; margin:5px;"><br><br>

        <input type="file" id="logoInput"><br><br>

        <button onclick="saveSetup()" 
        style="padding:15px; background:#22c55e; color:white; border:none; border-radius:10px;">
            Save & Continue
        </button>
    </div>

    <!-- MAIN APP -->
    <div id="app" style="display:none;">
        <h1 id="displayName"></h1>
        <img id="displayLogo" width="100"><br><br>

        <button onclick="showContact()">Contact</button>
        <button onclick="resetApp()">Reset</button>
    </div>

    <!-- CONTACT -->
    <div id="contact" style="display:none;">
        <h2>Contact</h2>

        <form action="https://formspree.io/f/xdawbqbj" method="POST">
            <input type="text" name="name" placeholder="Your Name"><br><br>
            <input type="email" name="email" placeholder="Your Email"><br><br>
            <textarea name="message" placeholder="Message"></textarea><br><br>
            <button type="submit">Send</button>
        </form>

        <br>
        <button onclick="goHome()">Back</button>
    </div>

    <script>
        // CHECK IF DATA EXISTS
        window.onload = function() {
            let name = localStorage.getItem("churchName");
            let logo = localStorage.getItem("churchLogo");

            if (name && logo) {
                document.getElementById("setup").style.display = "none";
                document.getElementById("app").style.display = "block";

                document.getElementById("displayName").innerText = name;
                document.getElementById("displayLogo").src = logo;
            }
        }

        function saveSetup() {
            let name = document.getElementById("churchName").value;
            let file = document.getElementById("logoInput").files[0];

            let reader = new FileReader();
            reader.onload = function() {
                localStorage.setItem("churchName", name);
                localStorage.setItem("churchLogo", reader.result);

                location.reload();
            }

            if (file) {
                reader.readAsDataURL(file);
            }
        }

        function showContact() {
            document.getElementById("app").style.display = "none";
            document.getElementById("contact").style.display = "block";
        }

        function goHome() {
            document.getElementById("app").style.display = "block";
            document.getElementById("contact").style.display = "none";
        }

        function resetApp() {
            localStorage.clear();
            location.reload();
        }
    </script>

</body>
</html>
